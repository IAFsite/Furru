<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FP001 | IAF</title>

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0f0f12;
  color:#fff;
}
.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
}
.hero img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.90);
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, #0f0f12 10%, transparent);
}
.hero-content{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:60px;
}
.hero h1{
  font-size:56px;
  margin:0;
}
.hero p{
  color:#aaa;
  font-size:18px;
}
.section{
  padding:80px 60px;
  max-width:1000px;
  margin:auto;
}
h2{
  margin-bottom:20px;
  font-size:28px;
}
.card{
  background:#14141b;
  padding:24px;
  border-radius:16px;
  margin-top:20px;
  line-height:1.6;
  color:#bbb;
  white-space: pre-line;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
@media(max-width:800px){
  .section{padding:60px 25px;}
  .hero-content{padding:40px 25px;}
  .grid{grid-template-columns:1fr;}
  .hero h1{font-size:40px;}
  .hero img{object-position:55% center;}
}
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-direction:row-reverse; /* <-- ini bikin logo ke kiri */
  z-index:999;
  pointer-events:none;
}

.logo img{
  height:40px;
  opacity:.9;
  pointer-events:auto;
}

.back-btn{
  pointer-events:auto;
  text-decoration:none;
  color:#fff;
  background:rgba(20,20,27,.6);
  backdrop-filter:blur(6px);
  padding:10px 18px;
  border-radius:999px;
  font-size:14px;
  transition:.2s;
}

.back-btn:hover{
  background:rgba(255,255,255,.1);
}
</style>
</head>

<body>

  <div class="topbar">
  <div class="logo">
    <img src="../iaf-logo.png" alt="IAF Logo">
  </div>

  <a href="../pro/index.html" class="back-btn">
    ← Back to Catalog
  </a>
</div>

<!-- HERO -->
<section class="hero" id="hero">
  <img src="" alt="">
  <div class="hero-content">
    <h1></h1>
    <p></p>
  </div>
</section>

<!-- OVERVIEW -->
<section class="section">
  <h2>desricption</h2>
  <div class="card" id="overview"></div>
</section>

<!-- SPEC -->
<section class="section">
  <h2>Specification</h2>
  <div class="grid" id="specs"></div>
</section>

<script>

function generateDescription(fp){
  return `${fp.name} adalah unit Furru dengan serial number ${fp.sn} dan REG-ID ${fp.reg}, ${fp.name} sudah aktif sejak ${fp.deploy}.

${fp.name} menggunakan base model avatar ${fp.model}, unit ini memiliki tinggi ${fp.height_no_ears} cm tanpa telinga dan ${fp.height_with_ears} cm secara keseluruhan.

Unit ini diklasifikasikan sebagai ${fp.sex}.`;
}
  
function getUnitID(){
  const params = new URLSearchParams(window.location.search);
  return params.get("id") || "FP001";
}

async function loadFP(){

  const unitID = getUnitID();

  try {

    const response = await fetch("data.json");
    if (!response.ok) throw new Error("Fetch gagal");

    const data = await response.json();

    // ambil unit sesuai ID dari URL
    let fp = data?.personnel?.[unitID];

    // fallback kalau ID ga valid
    if(!fp){
      console.warn("Unit tidak ditemukan, fallback ke FP001");
      fp = data?.personnel?.["FP001"];
    }

    updateHero(fp);
    updateOverview(fp);
    updateSpecs(fp);

  } catch (err) {
    console.error("Load error:", err);
  }
}

function updateHero(fp){

  const heroImg = document.querySelector(".hero img");
  const heroTitle = document.querySelector(".hero h1");
  const heroSub = document.querySelector(".hero p");

  heroImg.src = fp.profile || "";
  heroImg.alt = fp.sn || "profile";

  heroTitle.textContent = fp.name || "Unknown Unit";
  heroSub.textContent = fp.subtitle || "";

  // update tab title juga
  document.title = (fp.sn || "Unit") + " | IAF";
}

function updateOverview(fp){
  const overview = document.getElementById("overview");
  overview.textContent = fp.description || generateDescription(fp);

}

function updateSpecs(fp){

  const specs = document.getElementById("specs");
  specs.innerHTML = "";

  const fields = [
    ["Base Model", fp.model],
    ["Sex", fp.sex],
    ["Height", formatCM(fp.height_no_ears)],
    ["Height with Ears", formatCM(fp.height_with_ears)],
    ["Deployment", fp.deploy],
    ["Role", fp.role]
  ];

  fields.forEach(([label,value])=>{
    if(!value) return;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<strong>${label}</strong><br>${value}`;
    specs.appendChild(card);
  });
}

function formatCM(val){
  return val ? `${val} cm` : null;
}

// LOAD PAGE
loadFP();

</script>
</body>

</html>
